<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE XOLO - Movies, Events & More</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #f84464;
    --dark: #1a1a2e;
    --darker: #0f0f1a;
    --card: #16213e;
    --accent: #e94560;
    --gold: #f5a623;
    --green: #00c853;
    --text: #e0e0e0;
    --muted: #8892a4;
    --border: #2a2a4a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--darker); color: var(--text); font-family: 'Nunito', sans-serif; overflow-x:hidden; }
  
  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:#0f0f1a; }
  ::-webkit-scrollbar-thumb { background:var(--red); border-radius:3px; }

  /* NAV */
  nav {
    background: rgba(15,15,26,0.97);
    backdrop-filter: blur(20px);
    position: sticky; top:0; z-index:1000;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .nav-inner {
    max-width:1400px; margin:0 auto;
    display:flex; align-items:center; gap:20px;
    height:64px;
  }
  .logo {
    font-family:'Bebas Neue',cursive;
    font-size:2rem; letter-spacing:3px;
    background: linear-gradient(135deg, #f84464, #f5a623);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    flex-shrink:0; cursor:pointer;
  }
  .city-picker {
    display:flex; align-items:center; gap:6px;
    background:var(--card); border:1px solid var(--border);
    border-radius:8px; padding:7px 14px; cursor:pointer;
    font-size:.85rem; font-weight:600; color:var(--red);
    transition:.2s; position:relative;
  }
  .city-picker:hover { border-color:var(--red); }
  .search-bar {
    flex:1; background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:10px 18px;
    display:flex; align-items:center; gap:10px;
    transition:.2s;
  }
  .search-bar:focus-within { border-color:var(--red); }
  .search-bar input {
    background:none; border:none; outline:none;
    color:var(--text); font-size:.9rem; font-family:'Nunito',sans-serif; width:100%;
  }
  .search-bar input::placeholder { color:var(--muted); }
  .nav-links { display:flex; gap:6px; }
  .nav-link {
    padding:8px 14px; border-radius:8px; font-size:.85rem;
    font-weight:700; cursor:pointer; transition:.2s; white-space:nowrap;
    color:var(--muted);
  }
  .nav-link:hover { background:var(--card); color:var(--text); }
  .btn-signin {
    background: linear-gradient(135deg, var(--red), #c0392b);
    color:#fff; border:none; padding:9px 22px;
    border-radius:8px; font-weight:800; cursor:pointer;
    font-family:'Nunito',sans-serif; font-size:.85rem;
    transition:.2s; white-space:nowrap;
  }
  .btn-signin:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(248,68,100,.4); }

  /* CITY DROPDOWN */
  .city-dropdown {
    display:none; position:absolute; top:110%; left:0;
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:16px; width:320px;
    box-shadow:0 20px 60px rgba(0,0,0,.6); z-index:2000;
  }
  .city-dropdown.show { display:block; }
  .city-dropdown h4 { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
  .cities-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .city-item {
    text-align:center; padding:10px 6px; border-radius:8px;
    cursor:pointer; transition:.2s; font-size:.8rem; font-weight:700;
  }
  .city-item:hover { background:var(--red); color:#fff; }
  .city-icon { font-size:1.4rem; display:block; margin-bottom:4px; }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
    padding: 40px 24px 0;
    overflow:hidden; position:relative;
  }
  .hero::before {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 30% 50%, rgba(248,68,100,.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(245,166,35,.06) 0%, transparent 60%);
  }
  .hero-inner { max-width:1400px; margin:0 auto; }
  
  /* BANNER SLIDER */
  .banner-slider { position:relative; border-radius:20px; overflow:hidden; margin-bottom:40px; }
  .slides { display:flex; transition:transform .5s cubic-bezier(.77,0,.175,1); }
  .slide {
    min-width:100%; height:420px; position:relative;
    display:flex; align-items:flex-end;
    background-size:cover; background-position:center;
  }
  .slide-1 { background: linear-gradient(135deg, #1a0a2e 0%, #2d1b69 50%, #11998e 100%); }
  .slide-2 { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
  .slide-3 { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); }
  .slide-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(15,15,26,.95) 0%, rgba(15,15,26,.3) 60%, transparent 100%);
  }
  .slide-art {
    position:absolute; right:40px; top:20px; bottom:0;
    display:flex; align-items:center; gap:16px;
  }
  .movie-poster-hero {
    width:140px; border-radius:12px; overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.7);
    transition:.3s; animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .movie-poster-hero img { width:100%; display:block; }
  .poster-placeholder {
    background: linear-gradient(135deg, var(--card), var(--border));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:200px; gap:10px; color:var(--muted); font-size:.85rem;
  }
  .slide-content { position:relative; z-index:2; padding:30px 40px; width:60%; }
  .slide-tag {
    display:inline-block; background:var(--red);
    padding:4px 12px; border-radius:20px; font-size:.75rem;
    font-weight:800; margin-bottom:12px; text-transform:uppercase; letter-spacing:1px;
  }
  .slide-title { font-family:'Bebas Neue',cursive; font-size:3rem; line-height:1; margin-bottom:10px; }
  .slide-meta { display:flex; gap:16px; font-size:.85rem; color:var(--muted); margin-bottom:20px; }
  .slide-meta span { display:flex; align-items:center; gap:5px; }
  .rating-badge { background:var(--gold); color:#000; padding:3px 10px; border-radius:6px; font-weight:800; font-size:.85rem; }
  .slide-btn {
    background: linear-gradient(135deg, var(--red), #c0392b);
    border:none; color:#fff; padding:12px 30px; border-radius:10px;
    font-weight:800; font-size:1rem; cursor:pointer; font-family:'Nunito',sans-serif;
    transition:.2s;
  }
  .slide-btn:hover { transform:scale(1.04); box-shadow:0 6px 24px rgba(248,68,100,.5); }
  .slider-dots {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:3;
  }
  .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; transition:.3s; }
  .dot.active { background:var(--red); width:24px; border-radius:4px; }
  .slider-btn {
    position:absolute; top:50%; transform:translateY(-50%);
    background:rgba(15,15,26,.8); border:1px solid var(--border);
    color:#fff; width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:1.2rem; z-index:3; transition:.2s;
  }
  .slider-btn:hover { background:var(--red); border-color:var(--red); }
  .slider-prev { left:16px; }
  .slider-next { right:16px; }

  /* SECTIONS */
  section { max-width:1400px; margin:0 auto; padding:40px 24px; }
  .section-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:24px;
  }
  .section-title { font-family:'Bebas Neue',cursive; font-size:1.8rem; letter-spacing:2px; }
  .section-title span { color:var(--red); }
  .see-all {
    color:var(--red); font-weight:700; font-size:.85rem;
    cursor:pointer; display:flex; align-items:center; gap:4px;
    text-decoration:none;
  }
  .see-all:hover { text-decoration:underline; }

  /* FILTERS */
  .filters {
    display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px;
  }
  .filter-btn {
    padding:8px 18px; border-radius:20px; font-size:.82rem;
    font-weight:700; cursor:pointer; border:1px solid var(--border);
    background:var(--card); color:var(--muted); transition:.2s;
    font-family:'Nunito',sans-serif;
  }
  .filter-btn:hover, .filter-btn.active { background:var(--red); color:#fff; border-color:var(--red); }

  /* MOVIE GRID */
  .movies-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
  }
  .movie-card {
    background:var(--card); border-radius:14px; overflow:hidden;
    border:1px solid var(--border); cursor:pointer;
    transition:transform .2s, box-shadow .2s;
    position:relative;
  }
  .movie-card:hover { transform:translateY(-6px); box-shadow:0 20px 50px rgba(0,0,0,.5); }
  .movie-card:hover .book-now-overlay { opacity:1; }
  .poster-wrap { position:relative; overflow:hidden; }
  .movie-poster {
    width:100%; aspect-ratio:2/3; object-fit:cover;
    background: linear-gradient(135deg, #1a1a3e, #2a2a5e);
    display:flex; align-items:center; justify-content:center;
    font-size:3rem;
  }
  .poster-emoji { font-size:3.5rem; }
  .book-now-overlay {
    position:absolute; inset:0; background:rgba(248,68,100,.85);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:.3s;
  }
  .book-now-overlay span { font-weight:800; font-size:1.1rem; color:#fff; }
  .movie-badge {
    position:absolute; top:10px; left:10px;
    background:rgba(0,0,0,.8); color:#fff;
    font-size:.65rem; font-weight:800; padding:3px 8px; border-radius:6px;
    text-transform:uppercase; letter-spacing:.5px;
  }
  .badge-new { background:var(--green); }
  .badge-hot { background:var(--red); }
  .badge-upcoming { background:var(--gold); color:#000; }
  .movie-info { padding:14px; }
  .movie-name { font-weight:800; font-size:.92rem; margin-bottom:6px; line-height:1.3; }
  .movie-genres { font-size:.75rem; color:var(--muted); margin-bottom:8px; }
  .movie-footer { display:flex; justify-content:space-between; align-items:center; }
  .movie-rating { display:flex; align-items:center; gap:4px; font-size:.8rem; font-weight:700; color:var(--gold); }
  .movie-lang {
    font-size:.7rem; background:var(--darker); padding:3px 8px;
    border-radius:5px; color:var(--muted); font-weight:700;
  }
  .like-bar {
    margin-top:8px; display:flex; align-items:center; gap:6px;
    font-size:.75rem; color:var(--muted);
  }
  .like-fill { height:4px; background:var(--border); border-radius:2px; flex:1; overflow:hidden; }
  .like-fill-inner { height:100%; background:var(--green); border-radius:2px; }

  /* HORIZONTAL SCROLL */
  .scroll-row {
    display:flex; gap:16px; overflow-x:auto; padding-bottom:12px;
    scrollbar-width:thin; scrollbar-color: var(--red) transparent;
  }
  .scroll-row::-webkit-scrollbar { height:4px; }
  .scroll-row::-webkit-scrollbar-thumb { background:var(--red); border-radius:2px; }

  /* EVENT CARDS */
  .event-card {
    min-width:280px; background:var(--card); border-radius:14px;
    overflow:hidden; border:1px solid var(--border); cursor:pointer;
    transition:.2s; flex-shrink:0;
  }
  .event-card:hover { transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,.4); }
  .event-img {
    height:160px; background-size:cover; background-position:center;
    position:relative; display:flex; align-items:center; justify-content:center;
    font-size:4rem;
  }
  .event-img-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(22,33,62,.9) 0%, transparent 60%);
  }
  .event-date-badge {
    position:absolute; top:12px; right:12px;
    background:var(--red); color:#fff; padding:4px 10px;
    border-radius:8px; font-size:.75rem; font-weight:800; z-index:1;
  }
  .event-info { padding:14px; }
  .event-name { font-weight:800; font-size:.92rem; margin-bottom:6px; }
  .event-detail { font-size:.78rem; color:var(--muted); display:flex; gap:12px; }
  .event-price { color:var(--red); font-weight:800; font-size:.9rem; margin-top:8px; }

  /* SPORTS CARD */
  .sport-card {
    min-width:240px; background:var(--card); border-radius:14px;
    overflow:hidden; border:1px solid var(--border); cursor:pointer;
    transition:.2s; flex-shrink:0;
  }
  .sport-card:hover { transform:translateY(-4px); }
  .sport-header { padding:16px; background:linear-gradient(135deg, var(--dark), var(--card)); }
  .sport-teams { display:flex; align-items:center; justify-content:space-between; }
  .team { text-align:center; }
  .team-icon { font-size:2.5rem; }
  .team-name { font-size:.78rem; font-weight:800; margin-top:4px; }
  .vs-badge { font-family:'Bebas Neue',cursive; font-size:1.5rem; color:var(--red); }
  .sport-info { padding:12px 16px; }
  .sport-name { font-weight:800; font-size:.88rem; }
  .sport-meta { font-size:.75rem; color:var(--muted); margin-top:4px; }
  .sport-price { color:var(--red); font-weight:700; font-size:.85rem; margin-top:6px; }

  /* OFFERS */
  .offers-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:16px;
  }
  .offer-card {
    background:var(--card); border-radius:14px; padding:20px;
    border:1px solid var(--border); display:flex; gap:16px;
    align-items:center; cursor:pointer; transition:.2s;
  }
  .offer-card:hover { border-color:var(--red); transform:translateY(-2px); }
  .offer-icon { font-size:2.5rem; flex-shrink:0; }
  .offer-title { font-weight:800; font-size:.92rem; }
  .offer-desc { font-size:.78rem; color:var(--muted); margin-top:4px; }
  .offer-tag { color:var(--green); font-weight:800; font-size:.8rem; margin-top:6px; }

  /* BOOKING MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.85); backdrop-filter:blur(10px);
    z-index:9999; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--dark); border:1px solid var(--border); border-radius:20px;
    width:100%; max-width:700px; max-height:90vh; overflow-y:auto;
    animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn { from{opacity:0;transform:scale(.9) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-header {
    padding:24px 28px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:flex-start;
    position:sticky; top:0; background:var(--dark); z-index:1; border-radius:20px 20px 0 0;
  }
  .modal-title { font-family:'Bebas Neue',cursive; font-size:1.8rem; }
  .modal-close {
    background:var(--card); border:1px solid var(--border); color:var(--text);
    width:36px; height:36px; border-radius:50%; font-size:1.2rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:.2s;
  }
  .modal-close:hover { background:var(--red); border-color:var(--red); }
  .modal-body { padding:24px 28px; }

  /* DATE SELECTOR */
  .date-selector { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; margin-bottom:24px; }
  .date-btn {
    min-width:64px; text-align:center; padding:10px 8px; border-radius:10px;
    border:1px solid var(--border); background:var(--card); cursor:pointer;
    transition:.2s; flex-shrink:0;
  }
  .date-btn:hover, .date-btn.active { border-color:var(--red); background:var(--red); color:#fff; }
  .date-day { font-size:.65rem; text-transform:uppercase; font-weight:700; opacity:.7; }
  .date-num { font-size:1.2rem; font-weight:800; }
  .date-mon { font-size:.65rem; text-transform:uppercase; font-weight:700; opacity:.7; }

  /* CINEMA LIST */
  .cinema-block { border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:16px; }
  .cinema-header {
    padding:16px 20px; background:var(--card);
    display:flex; justify-content:space-between; align-items:center;
  }
  .cinema-name { font-weight:800; font-size:.95rem; }
  .cinema-tags { display:flex; gap:6px; }
  .cinema-tag {
    font-size:.68rem; padding:3px 8px; border-radius:4px;
    font-weight:700; text-transform:uppercase;
    border:1px solid var(--border); color:var(--muted);
  }
  .showtimes { padding:16px 20px; display:flex; gap:12px; flex-wrap:wrap; }
  .showtime-btn {
    padding:8px 16px; border:1px solid var(--green); color:var(--green);
    border-radius:8px; font-size:.82rem; font-weight:700; cursor:pointer;
    background:transparent; font-family:'Nunito',sans-serif; transition:.2s;
  }
  .showtime-btn:hover { background:var(--green); color:#000; }
  .showtime-btn.almost-full { border-color:var(--gold); color:var(--gold); }
  .showtime-btn.almost-full:hover { background:var(--gold); color:#000; }
  .showtime-btn.housefull { border-color:var(--red); color:var(--red); opacity:.5; cursor:not-allowed; }

  /* SEAT SELECTOR */
  .seat-section { margin-bottom:28px; }
  .seat-type-label {
    font-size:.75rem; text-transform:uppercase; color:var(--muted);
    font-weight:700; letter-spacing:1px; margin-bottom:12px; display:flex;
    justify-content:space-between;
  }
  .seat-type-label span { color:var(--text); }
  .seat-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .seat {
    width:36px; height:36px; border-radius:8px 8px 4px 4px;
    border:1px solid; cursor:pointer; transition:.15s;
    display:flex; align-items:center; justify-content:center;
    font-size:.65rem; font-weight:700; position:relative;
  }
  .seat.available { border-color:var(--green); color:var(--green); background:transparent; }
  .seat.available:hover { background:var(--green); color:#000; transform:scale(1.1); }
  .seat.selected { background:var(--red); border-color:var(--red); color:#fff; }
  .seat.booked { border-color:var(--border); color:var(--border); cursor:not-allowed; background:rgba(42,42,74,.5); }
  .screen-line {
    text-align:center; margin:20px 0 28px; position:relative;
    font-size:.75rem; color:var(--muted); font-weight:700; letter-spacing:2px;
  }
  .screen-line::before {
    content:''; position:absolute; top:50%; left:0; right:0; height:3px;
    background:linear-gradient(90deg, transparent, rgba(248,68,100,.6), transparent);
    transform:translateY(-50%); z-index:-1;
  }
  .screen-line span { background:var(--dark); padding:0 16px; }
  .seat-legend {
    display:flex; gap:20px; margin-bottom:20px; flex-wrap:wrap;
  }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:.78rem; }
  .legend-box { width:20px; height:20px; border-radius:4px; border:1px solid; }
  .legend-avail { border-color:var(--green); }
  .legend-sel { background:var(--red); border-color:var(--red); }
  .legend-book { border-color:var(--border); background:rgba(42,42,74,.5); }

  /* BOOKING SUMMARY */
  .booking-summary {
    background:var(--card); border-radius:12px; padding:20px;
    border:1px solid var(--border); margin-top:20px;
  }
  .summary-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 0; border-bottom:1px solid var(--border); font-size:.88rem;
  }
  .summary-row:last-child { border-bottom:none; }
  .summary-total { font-weight:800; font-size:1.05rem; color:var(--red); }

  /* PAYMENT */
  .payment-section { margin-top:24px; }
  .pay-title { font-weight:800; font-size:1rem; margin-bottom:16px; }
  .pay-methods { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .pay-method {
    padding:14px; border:1px solid var(--border); border-radius:10px;
    cursor:pointer; transition:.2s; text-align:center;
  }
  .pay-method:hover { border-color:var(--red); }
  .pay-method.active { border-color:var(--red); background:rgba(248,68,100,.1); }
  .pay-method-icon { font-size:1.8rem; margin-bottom:6px; }
  .pay-method-name { font-size:.8rem; font-weight:700; }
  .pay-input {
    width:100%; backgr
